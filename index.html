<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>士業向け 無料Web課題診断ツール | Graph 310°</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue-dark: #1A43AA;
      --blue-mid: #15A2E9;
      --blue-light: #E0E6F4;
      --blue-bg: #F0F4FA;
      --white: #FFFFFF;
      --text: #1A1A2E;
      --gray: #6B7280;
      --border: #C8D8EE;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--blue-bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; }

    /* HEADER */
    header {
      background: #0A2560;
      padding: 16px 20px;
      text-align: center;
    }
    .header-title {
      color: var(--white);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .header-title span {
      color: rgba(255,255,255,0.7);
      font-weight: 400;
      font-size: 13px;
    }

    /* HERO */
    .hero {
      position: relative;
      max-width: 480px;
      margin: 0 auto;
    }
    .hero-img {
      width: 100%;
      display: block;
    }
    .hero-btn-overlay {
      position: absolute;
      top: 84.7%;
      left: 0;
      right: 0;
      width: 100%;
      z-index: 10;
    }

    .hero-eyebrow {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      color: var(--white);
      font-size: 12px;
      font-weight: 700;
      padding: 5px 16px;
      border-radius: 4px;
      margin-bottom: 16px;
      letter-spacing: 0.08em;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .hero h1 {
      font-size: clamp(22px, 6vw, 34px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.45;
      margin-bottom: 14px;
    }

    .hero h1 em {
      color: #FFD84D;
      font-style: normal;
      border-bottom: 3px solid #FFD84D;
    }

    .hero p {
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      line-height: 1.8;
      margin-bottom: 24px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 28px;
      background: rgba(255,255,255,0.12);
      border-radius: 8px;
      overflow: hidden;
      max-width: 340px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .stat { flex: 1; padding: 12px 8px; border-right: 1px solid rgba(255,255,255,0.15); text-align: center; }
    .stat:last-child { border-right: none; }
    .stat-num { font-size: 22px; font-weight: 900; color: #FFD84D; display: block; }
    .stat-label { font-size: 11px; color: rgba(255,255,255,0.7); display: block; margin-top: 2px; }



    /* HERO BUTTON */
    .start-btn {
      background: transparent;
      color: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      width: 100%;
      height: calc(100vw * 0.12);
      display: block;
      -webkit-tap-highlight-color: transparent;
    }

    /* MAIN */
    main { max-width: 600px; margin: 0 auto; padding: 0 16px 60px; }

    /* PROGRESS */
    .progress-wrap { padding: 24px 0 16px; }
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .progress-step { font-size: 14px; font-weight: 700; color: var(--blue-dark); }
    .progress-pct { font-size: 14px; font-weight: 700; color: var(--blue-dark); }
    .progress-track { height: 6px; background: var(--border); border-radius: 99px; }
    .progress-fill { height: 6px; background: linear-gradient(90deg, var(--blue-dark), var(--blue-mid)); border-radius: 99px; transition: width 0.4s ease; }

    /* QUESTION CARD */
    .q-card {
      background: var(--white);
      border-radius: 10px;
      padding: 28px 22px;
      box-shadow: 0 2px 12px rgba(26,67,170,0.1);
      border: 1px solid var(--border);
      animation: fadeUp 0.4s ease both;
    }
    .q-category {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--blue-dark);
      background: var(--blue-light);
      padding: 4px 10px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 14px;
    }
    .q-text { font-size: 20px; font-weight: 900; color: var(--text); line-height: 1.5; margin-bottom: 20px; }
    .multi-hint { font-size: 13px; color: var(--gray); margin-bottom: 14px; }

    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt-btn {
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .opt-btn:hover { border-color: var(--blue-dark); background: var(--blue-light); }
    .opt-btn.selected { border-color: var(--blue-dark); background: var(--blue-light); color: var(--blue-dark); font-weight: 700; }
    .opt-mark {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      color: var(--gray);
      background: var(--blue-bg);
    }
    .opt-btn.selected .opt-mark { background: var(--blue-dark); color: var(--white); border-color: var(--blue-dark); }

    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; }
    .back-btn {
      background: transparent;
      border: 2px solid var(--border);
      border-radius: 6px;
      padding: 12px 24px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--gray);
      cursor: pointer;
      transition: all 0.15s;
    }
    .back-btn:hover { border-color: var(--gray); color: var(--text); }
    .next-btn {
      background: var(--blue-dark);
      border: none;
      border-radius: 6px;
      padding: 14px 32px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 900;
      color: var(--white);
      cursor: pointer;
      transition: all 0.15s;
      opacity: 0.3;
      pointer-events: none;
    }
    .next-btn.active { opacity: 1; pointer-events: auto; }
    .next-btn.active:hover { background: #0E3278; }

    /* LOADING */
    .loading { text-align: center; padding: 60px 0; }
    .loading-ring {
      width: 56px; height: 56px;
      border: 4px solid var(--border);
      border-top-color: var(--blue-dark);
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 0.9s linear infinite;
    }
    .loading-text { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 24px; }
    .loading-steps { display: flex; flex-direction: column; gap: 12px; max-width: 280px; margin: 0 auto; }
    .loading-step {
      font-size: 14px; color: var(--border); text-align: left;
      opacity: 0; transition: all 0.5s;
      display: flex; align-items: center; gap: 10px;
    }
    .loading-step.show { opacity: 1; color: var(--gray); }
    .loading-step.done { color: var(--blue-dark); font-weight: 700; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* RESULT */
    .result-hero {
      background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
      padding: 32px 20px;
      text-align: center;
      border-radius: 10px;
      margin-top: 24px;
      margin-bottom: 16px;
    }
    .result-label { font-size: 12px; font-weight: 700; letter-spacing: 0.2em; color: #FFD84D; display: block; margin-bottom: 10px; }
    .result-title { font-size: clamp(17px, 4.5vw, 22px); font-weight: 900; color: var(--white); line-height: 1.5; margin-bottom: 8px; }
    .result-sub { font-size: 13px; color: rgba(255,255,255,0.75); }

    .card {
      background: var(--white);
      border-radius: 10px;
      padding: 24px 20px;
      margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(26,67,170,0.08);
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--blue-dark);
      border-left: 4px solid var(--blue-dark);
      padding-left: 10px;
      margin-bottom: 18px;
    }
    .rank-row { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 16px; text-align: center; }
    .rank-badge {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 900;
      flex-shrink: 0;
      border: 3px solid;
    }
    .rank-badge.rank-a { background: #EEF7EE; color: #2E7D32; border-color: #2E7D32; }
    .rank-badge.rank-b { background: #FFF8E1; color: #F57F17; border-color: #F57F17; }
    .rank-badge.rank-c { background: #FFEBEE; color: #C62828; border-color: #C62828; }
    .rank-label { font-size: 18px; font-weight: 900; color: var(--text); line-height: 1.4; text-align: center; }
    .rank-comment { font-size: 14px; color: var(--gray); line-height: 1.8; }

    .issue-item { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; padding: 14px 0; border-bottom: 1px solid var(--blue-light); }
    .issue-item:last-child { border-bottom: none; padding-bottom: 0; }
    .issue-icon {
      width: 48px; height: 48px;
      border-radius: 8px;
      background: var(--blue-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .issue-text { text-align: center; } .issue-text strong { display: block; font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .issue-text p { font-size: 13px; color: var(--gray); line-height: 1.6; }

    .budget-card {
      background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
      border-radius: 10px;
      padding: 24px 20px;
      margin-bottom: 14px;
    }
    .budget-label { font-size: 12px; font-weight: 700; letter-spacing: 0.15em; color: #FFD84D; display: block; margin-bottom: 8px; }
    .budget-range { font-size: 36px; font-weight: 900; color: var(--white); margin-bottom: 8px; line-height: 1.2; }
    .budget-note { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.6; }

    .cta-card {
      background: var(--white);
      border-radius: 10px;
      padding: 28px 20px;
      margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(26,67,170,0.08);
      border: 1px solid var(--border);
      text-align: center;
    }
    .cta-card h3 { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 10px; }
    .cta-card p { font-size: 14px; color: var(--gray); line-height: 1.7; margin-bottom: 22px; }
    .email-input {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 6px;
      padding: 15px 16px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .email-input:focus { border-color: var(--blue-dark); }
    .email-input::placeholder { color: #B0B8C4; }
    .cta-btn {
      width: 100%;
      background: var(--blue-dark);
      border: none;
      border-radius: 6px;
      padding: 18px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 17px;
      font-weight: 900;
      color: var(--white);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .cta-btn:hover { background: #0E3278; }
    .cta-note { font-size: 12px; color: var(--gray); margin-top: 10px; }
    .thanks-msg { display: none; padding: 20px 0; }
    .thanks-msg.show { display: block; }
    .thanks-msg h4 { font-size: 20px; font-weight: 900; color: var(--blue-dark); margin-bottom: 10px; }
    .thanks-msg p { font-size: 14px; color: var(--gray); line-height: 1.7; }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 24px 20px;
      background: var(--blue-dark);
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
    }
    footer .footer-logo { color: var(--white); font-size: 14px; font-weight: 500; display: block; margin-bottom: 4px; }

    .hidden { display: none !important; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>



<!-- HERO -->
<div class="hero" id="hero-section">
  <img class="hero-img" src="img/fv_bg.jpg" alt="士業向け無料ホームページ印象診断">
  <div class="hero-btn-overlay">
    <button class="start-btn" onclick="startDiagnosis()">今すぐ無料診断</button>
  </div>
</div>

<main>
  <section class="hidden" id="quiz-section">
    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-step" id="prog-step">STEP 1 / 5</span>
        <span class="progress-pct" id="prog-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="q-card" id="q-card">
      <div class="q-category" id="q-category"></div>
      <div class="q-text" id="q-text"></div>
      <div class="multi-hint hidden" id="multi-hint">複数選択できます</div>
      <div class="options" id="q-opts"></div>
      <div class="nav-row">
        <button class="back-btn" id="back-btn" onclick="prevQ()">← 戻る</button>
        <button class="next-btn" id="next-btn" onclick="nextQ()">次へ →</button>
      </div>
    </div>
  </section>

  <section class="hidden loading" id="loading-section">
    <div class="loading-ring"></div>
    <div class="loading-text">診断結果を分析中...</div>
    <div class="loading-steps">
      <div class="loading-step" id="ls1"><span class="step-dot"></span>業種プロファイルを確認</div>
      <div class="loading-step" id="ls2"><span class="step-dot"></span>Web課題を特定</div>
      <div class="loading-step" id="ls3"><span class="step-dot"></span>改善優先度を算出</div>
      <div class="loading-step" id="ls4"><span class="step-dot"></span>概算費用を計算</div>
    </div>
  </section>

  <section class="hidden" id="result-section">
    <div class="result-hero">
      <span class="result-label">診断結果</span>
      <div class="result-title" id="res-title"></div>
      <div class="result-sub" id="res-sub"></div>
    </div>
    <div class="card">
      <div class="card-title">WEB改善診断結果</div>
      <div class="rank-row">
        <div class="rank-badge" id="res-rank-badge"></div>
        <div class="rank-label" id="res-rank-label"></div>
      </div>
      <div class="rank-comment" id="res-comment"></div>
    </div>
    <div class="card">
      <div class="card-title">課題・改善ポイント</div>
      <div id="res-issues"></div>
    </div>
    <div class="budget-card">
      <span class="budget-label">概算費用の目安</span>
      <div class="budget-range" id="res-budget"></div>
      <div class="budget-note" id="res-budget-note"></div>
    </div>
    <div class="cta-card">
      <h3>診断結果の"具体的な改善案"を<br>メールでお送りします。</h3>
      <p>より具体的な改善ポイントと施策について、詳細レポートをメールでお送りします。</p>
      <div id="form-area">
        <input class="email-input" type="email" id="email-input" placeholder="メールアドレスを入力してください">
        <button class="cta-btn" onclick="submitContact()">改善案を受け取る（無料）</button>
        
      </div>
      <div class="thanks-msg" id="thanks-msg">
        <h4>ありがとうございます</h4>
        <p>診断結果とともに、24時間以内にご連絡いたします。<br>しばらくお待ちください。</p>
      </div>
    </div>
  </section>
</main>



<script>
const questions = [
  {
    id:"industry",
    category:"Q1 / 基本情報",
    text:"事業所の業種をお聞かせください",
    type:"single",
    options:["税務・会計系","労務・人事系","許認可・手続き系","法律系","その他"],
    scores:[10,10,10,10,8]
  },
  {
    id:"service",
    category:"Q2 / サービス内容",
    text:"主に扱っているサービスは？",
    type:"single",
    options:["相続・資産承継","法人顧問・継続契約","スポット相談・単発案件","助成金・労務関連","許認可・手続き関連","その他"],
    scores:[15,12,8,12,10,8]
  },
  {
    id:"status",
    category:"Q3 / サイト状況",
    text:"現在のWebの状況に一番近いものを選んでください",
    type:"single",
    options:["Webサイトがない","5年以上更新していない","2〜5年前に作ってほぼ放置","最近作ったが反応が少ない","安定して問い合わせはある"],
    scores:[25,20,18,12,5]
  },
  {
    id:"issues",
    category:"Q4 / 現在の課題",
    text:"現在感じている課題を教えてください（複数選択可）",
    type:"multi",
    options:["ホームページから問い合わせがほとんど来ない","他事務所との違いが打ち出せていない","サービスの強みがうまく伝わっていない","デザインが古く、印象が良くない気がする","スマホで見づらく、離脱されている気がする","検索しても上位に表示されない","更新や管理が手間で放置している","どこを改善すればいいかわからない"],
    scores:[8,7,7,6,6,5,4,5]
  },
  {
    id:"goal",
    category:"Q5 / 改善目標",
    text:"今回、最も改善したいことを教えてください",
    type:"single",
    options:["問い合わせを増やしたい","採用を強化したい","営業・商談で使う資料を改善したい","展示会や広告の反応を改善したい","何から改善すればいいかわからない"],
    scores:[15,12,10,10,8]
  },
  {
    id:"inquiry_status",
    category:"Q5α / 問い合わせ状況",
    text:"問い合わせを増やしたいと回答した方へ｜現在の状況は？",
    type:"single",
    options:["ほとんど来ない","月に1〜2件","一定数あるが質が悪い","問い合わせはあるが安定しない"],
    scores:[15,12,10,10],
    isBranch:true
  },
  {
    id:"authority",
    category:"Q6 / 立場・権限",
    text:"Webサイトやデザイン改善について、どのような立場ですか？",
    type:"single",
    options:["自分で決定できる","社内で提案・検討ができる","情報収集をしている段階"],
    scores:[20,12,5]
  },
  {
    id:"timing",
    category:"Q7 / 検討時期",
    text:"改善の検討時期について教えてください",
    type:"single",
    options:["すぐにでも検討したい","良い案があれば検討したい","今は情報収集中"],
    scores:[15,10,5]
  },
  {
    id:"budget",
    category:"Q8 / 予算感",
    text:"デザイン・Web改善にかけられるご予算感を教えてください",
    type:"single",
    options:["50万円以上","30〜50万円","10〜30万円","まずは相談して決めたい"],
    scores:[20,15,10,8],
    budgets:["50万円以上","30〜50万円","10〜30万円","要相談"]
  },
  {
    id:"url",
    category:"URL（任意）",
    text:"診断精度を高めるため、WebサイトURLをご入力ください（任意）",
    type:"url",
    options:[],
    scores:[]
  }
];

// Q4の各選択肢 → 改善ポイントの主副・重みマッピング
const q4IssueMap = [
  { main:'P1', mainW:10, sub:'P2', subW:8 },  // 問い合わせが来ない
  { main:'P3', mainW:9,  sub:'P2', subW:8 },  // 差別化できない
  { main:'P2', mainW:9,  sub:'P4', subW:7 },  // 強みが伝わらない
  { main:'P5', mainW:8,  sub:'P4', subW:7 },  // デザインが古い
  { main:'P6', mainW:7,  sub:'P1', subW:6 },  // スマホで見づらい
  { main:'P7', mainW:6,  sub:'P2', subW:6 },  // 検索で上位に出ない
  { main:'P8', mainW:6,  sub:'P5', subW:5 },  // 更新・管理が手間
  { main:'P9', mainW:9,  sub:'P4', subW:7 },  // どこを改善すればいいかわからない
];

// 改善ポイントの詳細定義
const pointDefs = {
  P1: { title:'問い合わせが来る導線をつくりましょう', icon:'⚡', desc:'問い合わせボタンはすぐ見つかりますか？見つかりにくいと、興味を持ったお客様がそのまま離脱してしまいます。導線・CTA・フォームの流れを見直しましょう。小さな改善が、問い合わせ数に直結します。' },
  P2: { title:'貴事務所の価値を、伝わる形に整えましょう', icon:'🎯', desc:'サービスの魅力は、ちゃんと伝わっていますか？伝わらないと、お客様は他の事務所を探してしまいます。貴事務所ならではの強みや価値を、伝わる言葉とビジュアルで整理しましょう。' },
  P3: { title:'強みを言語化するところから始めましょう', icon:'✨', desc:'他事務所との違いは明確になっていますか？違いが見えないと、価格だけで比較されてしまいます。まずは選ばれる理由を言葉にすることが大切です。比較されても選ばれる設計を目指しましょう。' },
  P4: { title:'信頼される見せ方にしましょう', icon:'🤝', desc:'実績や事例は、きちんと見えていますか？信頼の根拠がないと、お客様は問い合わせをためらってしまいます。信頼につながる要素を整理して、不安を取り除きましょう。' },
  P5: { title:'サイトの印象を一新しましょう', icon:'🎨', desc:'サイトの見た目、古くなっていませんか？古さや見づらさは、そのまま信頼感の損失につながります。第一印象を改善するデザインへのアップデートがおすすめです。' },
  P6: { title:'スマホで見やすくしましょう', icon:'📱', desc:'スマホで見たとき、使いやすい状態になっていますか？見づらいと、お客様はすぐに別のサイトに移ってしまいます。モバイルでの操作性を改善して、離脱を防ぎましょう。' },
  P7: { title:'検索で見つかりやすくしましょう', icon:'🔍', desc:'検索したとき、貴事務所は上位に出てきますか？見つけてもらえないと、存在を知る機会自体が生まれません。まずはタイトルやページ構造の見直しから始めましょう。' },
  P8: { title:'更新しやすい仕組みにしましょう', icon:'🔧', desc:'サイトの更新、後回しになっていませんか？情報が古いままだと、お客様に不信感を与えてしまいます。管理・更新がしやすい構造への見直しがおすすめです。' },
  P9: { title:'まず何から直すか整理しましょう', icon:'📋', desc:'どこから手をつければいいか、迷っていませんか？優先順位が定まらないまま放置すると、機会損失が積み重なってしまいます。まずは改善の優先順位を一緒に整理しましょう。' },
  P10: { title:'集客の質と安定性を高めましょう', icon:'📊', desc:'問い合わせの数より、質や安定性に課題がありますか？質の低い問い合わせが続くと、対応コストだけがかさんでしまいます。ターゲットに合った導線の見直しがおすすめです。' },
};

// Q3サイト状況 → 3つ目の補完ポイント
const q3Supplement = [
  'P1', // サイトがない → まず導線設計
  'P5', // 5年以上更新なし → デザイン刷新
  'P5', // 2〜5年放置 → デザイン刷新
  'P1', // 最近作ったが反応なし → 導線改善
  'P3', // 安定してる → 差別化でさらに伸ばす
];

let cur = 0;
let answers = {};
let multiSelections = [];
let selectedBudget = "";

function getVisibleIndexes() {
  const list = [0,1,2];
  // Q3で「Webサイトがない」(index=0)を選んだらQ4をスキップ
  if (answers[2] !== 0) list.push(3);
  list.push(4);
  if (answers[4] === 0) list.push(5); // Q5αは問い合わせ増やしたいを選んだ人のみ
  list.push(6,7,8,9);
  return list;
}

function startDiagnosis() {
  document.getElementById('hero-section').classList.add('hidden');
  document.getElementById('quiz-section').classList.remove('hidden');
  document.getElementById('loading-section').classList.add('hidden');
  document.getElementById('result-section').classList.add('hidden');
  answers = {};
  multiSelections = [];
  cur = 0;
  window.scrollTo({top:0, behavior:'smooth'});
  renderQ();
}

function renderQ() {
  const indexes = getVisibleIndexes();
  const qIdx = indexes[cur];
  const q = questions[qIdx];
  const total = indexes.length;

  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('prog-step').textContent = `STEP ${cur+1} / ${total}`;
  const pct = Math.round((cur / total) * 100);
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  const mh = document.getElementById('multi-hint');
  q.type === 'multi' ? mh.classList.remove('hidden') : mh.classList.add('hidden');
  if (q.type === 'multi') multiSelections = answers[qIdx] ? [...answers[qIdx]] : [];

  document.getElementById('back-btn').style.visibility = cur === 0 ? 'hidden' : 'visible';

  const opts = document.getElementById('q-opts');
  opts.innerHTML = '';
  const nextBtn = document.getElementById('next-btn');
  nextBtn.classList.remove('active');

  if (q.type === 'url') {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;gap:8px;';
    const input = document.createElement('input');
    input.type = 'url';
    input.placeholder = 'https://example.com';
    input.value = answers[qIdx] || '';
    input.style.cssText = 'border:2px solid var(--border);border-radius:8px;padding:14px 16px;font-size:15px;font-family:inherit;outline:none;width:100%;';
    input.addEventListener('focus', () => input.style.borderColor = 'var(--blue-dark)');
    input.addEventListener('blur', () => input.style.borderColor = 'var(--border)');
    input.addEventListener('input', () => { answers[qIdx] = input.value || ''; });
    const skip = document.createElement('button');
    skip.textContent = 'スキップする';
    skip.style.cssText = 'background:transparent;border:none;color:var(--gray);font-size:13px;cursor:pointer;padding:8px;font-family:inherit;';
    skip.onclick = () => { answers[qIdx] = ''; nextQ(); };
    wrap.appendChild(input);
    wrap.appendChild(skip);
    opts.appendChild(wrap);
    nextBtn.classList.add('active');
    return;
  }

  const labels = ['A','B','C','D','E','F','G','H'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    if (q.type === 'single' && answers[qIdx] === i) btn.classList.add('selected');
    if (q.type === 'multi' && multiSelections.includes(i)) btn.classList.add('selected');
    btn.innerHTML = `<span class="opt-mark">${labels[i]}</span>${opt}`;
    btn.onclick = () => {
      if (q.type === 'single') {
        answers[qIdx] = i;
        if (q.id === 'budget') selectedBudget = q.budgets[i];
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        nextBtn.classList.add('active');
      } else {
        const idx = multiSelections.indexOf(i);
        idx > -1 ? multiSelections.splice(idx, 1) : multiSelections.push(i);
        btn.classList.toggle('selected');
        answers[qIdx] = multiSelections.length > 0 ? [...multiSelections] : null;
        nextBtn.classList[multiSelections.length > 0 ? 'add' : 'remove']('active');
      }
    };
    opts.appendChild(btn);
  });

  if (q.type === 'multi') {
    if (multiSelections.length > 0) nextBtn.classList.add('active');
  } else {
    if (answers[qIdx] !== undefined && answers[qIdx] !== null) nextBtn.classList.add('active');
  }

  document.getElementById('q-card').style.animation = 'none';
  void document.getElementById('q-card').offsetWidth;
  document.getElementById('q-card').style.animation = 'fadeUp 0.4s ease both';
}

function nextQ() {
  const total = getVisibleIndexes().length;
  if (cur < total - 1) { cur++; renderQ(); }
  else { showLoading(); }
}

function prevQ() {
  if (cur > 0) { cur--; renderQ(); }
}

function goTop() {
  document.getElementById('hero-section').classList.remove('hidden');
  document.getElementById('quiz-section').classList.add('hidden');
  document.getElementById('loading-section').classList.add('hidden');
  document.getElementById('result-section').classList.add('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
}

function showLoading() {
  document.getElementById('quiz-section').classList.add('hidden');
  document.getElementById('loading-section').classList.remove('hidden');
  const hasUrl = answers[9] && answers[9].length > 0;
  const steps = hasUrl
    ? ['サイトを分析中…','業種プロファイルを確認','Web課題を特定','改善優先度を算出']
    : ['回答データを確認','業種プロファイルを確認','Web課題を特定','改善優先度を算出'];
  ['ls1','ls2','ls3','ls4'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.querySelector('.step-dot').nextSibling.textContent = ' ' + steps[i];
    setTimeout(() => {
      el.classList.add('show');
      if (i > 0) document.getElementById(['ls1','ls2','ls3','ls4'][i-1]).classList.add('done');
    }, i * 800);
  });
  setTimeout(showResult, hasUrl ? 4000 : 3200);
}

function calcImprovements() {
  // Q4の選択肢から改善ポイントの重みを集計
  const selectedIssues = answers[3]; // Q4はindex3
  const pointScores = {};

  if (Array.isArray(selectedIssues)) {
    selectedIssues.forEach(i => {
      const mapping = q4IssueMap[i];
      if (!mapping) return;
      pointScores[mapping.main] = (pointScores[mapping.main] || 0) + mapping.mainW;
      pointScores[mapping.sub]  = (pointScores[mapping.sub]  || 0) + mapping.subW;
    });
  }

  // 重み順にソート
  const sorted = Object.entries(pointScores).sort((a,b) => b[1]-a[1]);
  const top2 = sorted.slice(0,2).map(e => e[0]);

  // 3つ目はQ3から補完
  const q3Ans = answers[2]; // Q3はindex2
  let third = q3Supplement[q3Ans] || 'P1';
  // top2と重複しないように
  if (top2.includes(third)) {
    const candidates = ['P1','P2','P3','P4','P5'].filter(p => !top2.includes(p));
    third = candidates[0] || 'P4';
  }

  return [...top2, third];
}

function showResult() {
  document.getElementById('loading-section').classList.add('hidden');
  document.getElementById('result-section').classList.remove('hidden');

  // スコア計算
  let score = 0;
  getVisibleIndexes().forEach(qi => {
    const ans = answers[qi];
    if (Array.isArray(ans)) {
      ans.forEach(i => { if (questions[qi].scores[i] !== undefined) score += questions[qi].scores[i]; });
    } else if (ans !== null && ans !== undefined && questions[qi].scores[ans] !== undefined) {
      score += questions[qi].scores[ans];
    }
  });
  score = Math.min(150, score);

  // ランク判定
  let rank, rankLabel, rankComment;
  if (score < 50) {
    rank = 'A'; rankLabel = 'Aランク（良好）';
    rankComment = '現状でも一定の評価はありますが、競合と比較された際に差がつきにくい状態です。さらなる改善で成果を伸ばせる可能性があります。';
  } else if (score < 90) {
    rank = 'B'; rankLabel = 'Bランク（改善余地あり）';
    rankComment = '現状でも一定の評価はありますが、本来得られるはずの案件を逃している可能性があります。';
  } else {
    rank = 'C'; rankLabel = 'Cランク（要改善）';
    rankComment = '現状のままでは、機会損失が発生している可能性が高い状態です。早めの見直しをおすすめします。';
  }

  const badge = document.getElementById('res-rank-badge');
  badge.textContent = rank;
  badge.className = 'rank-badge rank-' + rank.toLowerCase();
  document.getElementById('res-rank-label').textContent = rankLabel;
  document.getElementById('res-comment').textContent = rankComment;

  document.getElementById('res-title').textContent = `Webで${score >= 90 ? '大きな' : score >= 50 ? '一定の' : '基本的な'}改善余地があります`;
  document.getElementById('res-sub').textContent = '以下に課題の詳細と改善の方向性をまとめました';

  // 改善ポイント表示（Q4ベース＋Q3補完）
  const improvements = calcImprovements();
  const issuesEl = document.getElementById('res-issues');
  if (improvements.length > 0 && improvements.some(p => pointDefs[p])) {
    issuesEl.innerHTML = improvements.map((p, idx) => {
      const def = pointDefs[p];
      if (!def) return '';
      const label = idx === 0 ? '最優先' : idx === 1 ? '優先' : '補完';
      return `<div class="issue-item">
        <div class="issue-icon">${def.icon}</div>
        <div class="issue-text">
          <span style="font-size:11px;color:var(--blue-mid);font-weight:700;display:block;margin-bottom:3px;">${label}</span>
          <strong>${def.title}</strong>
          <p>${def.desc}</p>
        </div>
      </div>`;
    }).join('');
  } else {
    // Q4未選択のデフォルト
    issuesEl.innerHTML = [
      {icon:'🎯',title:'強み訴求の設計',desc:'サービスの価値や特徴が伝わるコピーとビジュアルで、「ここに頼みたい」を設計します。'},
      {icon:'⚡',title:'問い合わせ導線の設計',desc:'CTAの配置・文言・フォームの使いやすさなど、問い合わせにつながる導線を整備します。'},
      {icon:'✨',title:'差別化設計',desc:'他事務所との違いを明確にし、選ばれる理由をページ上で可視化します。'}
    ].map(i => `<div class="issue-item"><div class="issue-icon">${i.icon}</div><div class="issue-text"><strong>${i.title}</strong><p>${i.desc}</p></div></div>`).join('');
  }

  // 予算表示
  let budgetRange = '', budgetNote = '';
  if (!selectedBudget || selectedBudget === '要相談') {
    budgetRange = score >= 90 ? '30〜80万円' : score >= 50 ? '15〜40万円' : '10〜25万円';
    budgetNote = 'ご状況に合わせた最適なプランをご提案します。';
  } else {
    budgetRange = selectedBudget;
    budgetNote = 'ご予算に合わせた最適なプランをご提案します。まずはお気軽にご相談ください。';
  }
  document.getElementById('res-budget').textContent = budgetRange;
  document.getElementById('res-budget-note').textContent = budgetNote;
}

function submitContact() {
  const email = document.getElementById('email-input').value;
  if (!email || !email.includes('@')) { alert('メールアドレスを正しく入力してください'); return; }
  document.getElementById('form-area').style.display = 'none';
  document.getElementById('thanks-msg').classList.add('show');
}
</script>
